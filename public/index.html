<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>そうしよスワイプ｜挑戦機会をさがす</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@600;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0c1a30;
  --ink: #16213a;
  --muted: #637088;
  --violet: #1763d8;
  --violet2: #3d9bff;
  --coral: #ff7a18;
  --amber: #ffc24b;
  --card: #ffffff;
  --line: #e3edf9;
  --soft: #eef4fc;
  --grad: linear-gradient(120deg, #1763d8 0%, #2b8fff 100%);
  --grad-warm: linear-gradient(120deg, #ff7a18 0%, #ffb24d 100%);
  --shadow-sm: 0 6px 18px -10px rgba(20,74,150,.28);
  --shadow: 0 22px 50px -24px rgba(20,74,150,.40);
  --shadow-lg: 0 40px 90px -36px rgba(20,74,150,.52);
  --radius: 22px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: "Noto Sans JP", system-ui, sans-serif;
  color: var(--ink);
  background: #f6faff;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  letter-spacing: .01em;
  min-height: 100vh;
}
.wrap { max-width: 680px; margin: 0 auto; padding: 0 20px; }
.brandfont { font-family: "Outfit", "Noto Sans JP", sans-serif; }

/* ===== Header ===== */
header {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: saturate(180%) blur(14px);
  background: rgba(251,250,255,.80);
  border-bottom: 1px solid rgba(236,234,246,.9);
}
.nav { display: flex; align-items: center; justify-content: space-between; height: 60px; }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 17px; text-decoration: none; color: var(--ink); }
.logo .dot {
  width: 32px; height: 32px; border-radius: 10px;
  background: var(--grad); display: grid; place-items: center;
  color: #fff; font-size: 17px;
  box-shadow: 0 8px 20px -6px rgba(23,99,216,.55);
  font-family: "Outfit", sans-serif; font-weight: 800;
}
.logo small { display: block; font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: .08em; }
.nav-fav-btn {
  border: none; background: var(--soft); color: var(--violet);
  font-family: inherit; font-weight: 700; font-size: 13px;
  padding: 8px 14px; border-radius: 999px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: .18s;
}
.nav-fav-btn:hover { background: var(--violet); color: #fff; }
.fav-count {
  background: var(--coral); color: #fff;
  border-radius: 999px; padding: 1px 7px;
  font-size: 11px; font-weight: 900; min-width: 18px; text-align: center;
}

/* ===== Screens ===== */
.screen { display: none; }
.screen.active { display: block; animation: fade .35s ease; }

@keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideIn { from { opacity: 0; transform: translateX(48px); } to { opacity: 1; transform: none; } }

/* ===== Loading ===== */
#screen-loading { text-align: center; padding: 100px 20px; }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--line); border-top-color: var(--violet);
  border-radius: 50%; animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
.loading-text { color: var(--muted); font-weight: 600; font-size: 15px; }

/* ===== Error ===== */
#screen-error { text-align: center; padding: 80px 20px; }
.state-icon { font-size: 56px; margin-bottom: 18px; }
.state-title { font-size: 21px; font-weight: 900; margin-bottom: 10px; }
.state-msg { color: var(--muted); font-size: 14px; max-width: 380px; margin: 0 auto 28px; line-height: 1.8; }

/* ===== Empty ===== */
#screen-empty { text-align: center; padding: 80px 20px; }

/* ===== Done ===== */
#screen-done { text-align: center; padding: 80px 20px; }
.done-fav-hint { font-size: 13px; color: var(--muted); margin-top: 18px; }

/* ===== Swipe Screen ===== */
#screen-swipe { padding: 28px 0 60px; }

.swipe-header { text-align: center; margin-bottom: 20px; }
.progress-bar-wrap {
  height: 7px; background: var(--line); border-radius: 999px;
  overflow: hidden; max-width: 440px; margin: 0 auto 10px;
}
.progress-bar {
  height: 100%; background: var(--grad);
  border-radius: 999px;
  transition: width .45s cubic-bezier(.2,.8,.2,1);
  min-width: 0;
}
.progress-label { font-size: 13px; color: var(--muted); font-weight: 700; }

/* ===== Swipe Card ===== */
.card-stage { position: relative; max-width: 560px; margin: 0 auto; }
.swipe-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: 26px; box-shadow: var(--shadow);
  overflow: hidden; animation: slideIn .32s cubic-bezier(.2,.8,.2,1);
}
.card-header { padding: 22px 26px 18px; background: var(--grad); color: #fff; }
.card-org { font-size: 11px; font-weight: 700; opacity: .82; letter-spacing: .07em; margin-bottom: 5px; }
.card-title { font-size: 19px; font-weight: 900; line-height: 1.4; }
.card-body { padding: 20px 26px 24px; }
.card-badges { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
.badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
.badge-cat { background: var(--soft); color: var(--violet); }
.badge-area { background: rgba(255,122,24,.1); color: var(--coral); }
.badge-term { background: rgba(99,112,136,.1); color: var(--muted); }
.badge-reward { background: rgba(23,99,216,.08); color: var(--violet); }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; background: var(--soft); color: var(--muted); }
.card-gain { font-size: 14px; color: var(--ink); line-height: 1.72; }
.card-deadline {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--muted);
  margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line);
}
.card-deadline .dl-label { color: var(--coral); }

/* ===== Action Buttons ===== */
.action-bar {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; max-width: 560px; margin: 18px auto 0;
}
.action-btn {
  border: none; cursor: pointer; font-family: inherit;
  font-weight: 800; font-size: 15px; border-radius: 16px;
  padding: 15px 10px; display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  transition: transform .18s ease, box-shadow .18s ease;
}
.action-btn:active { transform: scale(.97); }
.action-btn .btn-icon { font-size: 22px; line-height: 1; }
.action-btn .btn-label { font-size: 12px; }
.btn-skip { background: #eef2f8; color: var(--muted); }
.btn-skip:hover { background: #e3eaf5; }
.btn-fav {
  background: var(--grad-warm); color: #fff;
  box-shadow: 0 12px 28px -10px rgba(255,122,24,.5);
}
.btn-fav:hover { transform: translateY(-2px); box-shadow: 0 18px 36px -12px rgba(255,122,24,.55); }
.btn-fav.saved {
  background: linear-gradient(135deg, #22c55e, #4ade80);
  box-shadow: 0 12px 28px -10px rgba(34,197,94,.4);
}
.btn-fav.saved:hover { transform: translateY(-2px); box-shadow: 0 18px 36px -12px rgba(34,197,94,.5); }
.btn-detail { background: var(--soft); color: var(--violet); border: 1.5px solid var(--line); }
.btn-detail:hover { background: var(--violet); color: #fff; border-color: var(--violet); }
.btn-url { background: var(--grad); color: #fff; box-shadow: 0 12px 28px -10px rgba(23,99,216,.5); }
.btn-url:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 18px 36px -12px rgba(23,99,216,.55); }
.btn-url:disabled { opacity: .35; cursor: not-allowed; box-shadow: none; }

/* ===== General Buttons ===== */
.btn {
  border: none; cursor: pointer; font-family: inherit;
  font-weight: 800; border-radius: 999px; padding: 13px 28px;
  font-size: 15px; transition: transform .18s ease, box-shadow .18s ease;
  text-decoration: none; display: inline-block;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--grad); color: #fff; box-shadow: 0 16px 34px -14px rgba(23,99,216,.65); }
.btn-primary:hover { transform: translateY(-2px); }
.btn-ghost { background: #fff; color: var(--violet); border: 1.5px solid var(--line); box-shadow: var(--shadow-sm); }
.btn-ghost:hover { border-color: var(--violet2); transform: translateY(-2px); }

.btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* ===== Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(16,33,58,.55); z-index: 200;
  align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; animation: fade .2s ease; }
.modal {
  background: #fff; border-radius: 26px;
  max-width: 600px; width: 100%; max-height: 88vh;
  overflow-y: auto; box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 24px 28px 20px;
  background: var(--grad); color: #fff;
  border-radius: 26px 26px 0 0;
  position: sticky; top: 0; z-index: 1;
}
.modal-close {
  float: right; background: rgba(255,255,255,.2);
  border: none; color: #fff; width: 32px; height: 32px;
  border-radius: 50%; cursor: pointer; font-size: 18px;
  display: grid; place-items: center; transition: .18s;
}
.modal-close:hover { background: rgba(255,255,255,.35); }
.modal-org { font-size: 11px; font-weight: 700; opacity: .82; margin-bottom: 4px; }
.modal-title { font-size: 20px; font-weight: 900; line-height: 1.4; }
.modal-body { padding: 24px 28px; }
.detail-row { margin-bottom: 16px; }
.detail-label { font-size: 10px; font-weight: 900; color: var(--muted); letter-spacing: .1em; margin-bottom: 4px; text-transform: uppercase; }
.detail-val { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.65; }
.modal-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }

/* ===== Favorites Modal ===== */
#modal-fav .modal-header { background: var(--grad-warm); }
.fav-list { display: grid; gap: 12px; margin-top: 4px; }
.fav-item { background: var(--soft); border-radius: 14px; padding: 14px 16px; }
.fav-item-org { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 3px; }
.fav-item-title { font-size: 14px; font-weight: 900; color: var(--ink); }
.fav-item-link { font-size: 12px; color: var(--violet); font-weight: 700; text-decoration: none; display: inline-block; margin-top: 6px; }
.fav-item-link:hover { text-decoration: underline; }
.fav-empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; line-height: 1.8; }
.fav-clear-btn {
  border: none; background: transparent; color: var(--muted);
  font-size: 12px; font-weight: 700; cursor: pointer;
  margin-top: 20px; display: block; width: 100%; text-align: center;
  padding: 8px; border-radius: 8px; transition: .18s;
}
.fav-clear-btn:hover { background: #fee2e2; color: #dc2626; }

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .action-bar { gap: 8px; }
  .action-btn { padding: 13px 6px; font-size: 14px; }
  .action-btn .btn-icon { font-size: 20px; }
  .swipe-card { border-radius: 20px; }
  .card-header { padding: 18px 20px 14px; }
  .card-body { padding: 16px 20px 20px; }
  .card-title { font-size: 17px; }
  .modal { border-radius: 20px; }
  .modal-header { border-radius: 20px 20px 0 0; }
}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="logo" href="#">
      <span class="dot">そ</span>
      <span>
        絶対そうしよ
        <small>スワイプで挑戦をさがす</small>
      </span>
    </a>
    <button class="nav-fav-btn" onclick="openFavModal()">
      ⭐ 気になる <span class="fav-count" id="favCount">0</span>
    </button>
  </div>
</header>

<main>
  <div class="wrap">

    <!-- ===== Loading ===== -->
    <div class="screen" id="screen-loading">
      <div class="spinner"></div>
      <p class="loading-text">挑戦機会を読み込み中...</p>
    </div>

    <!-- ===== Error ===== -->
    <div class="screen" id="screen-error">
      <div class="state-icon">⚠️</div>
      <div class="state-title">データを取得できませんでした</div>
      <p class="state-msg">サーバーへの接続に失敗しました。<br>しばらく時間をおいてから再試行してください。</p>
      <button class="btn btn-primary" onclick="loadSources()">再試行する</button>
    </div>

    <!-- ===== Empty ===== -->
    <div class="screen" id="screen-empty">
      <div class="state-icon">🌱</div>
      <div class="state-title">現在、掲載準備中です</div>
      <p class="state-msg">まもなく挑戦機会が掲載される予定です。<br>しばらくお待ちください。</p>
    </div>

    <!-- ===== Swipe ===== -->
    <div class="screen" id="screen-swipe">
      <div class="swipe-header">
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progressLabel">— / —</div>
      </div>

      <div class="card-stage">
        <div class="swipe-card" id="mainCard"></div>
      </div>

      <div class="action-bar">
        <button class="action-btn btn-skip" onclick="skipCard()">
          <span class="btn-icon">⏭</span>
          <span class="btn-label">スキップ</span>
        </button>
        <button class="action-btn btn-fav" id="btnFav" onclick="toggleFavCard()">
          <span class="btn-icon">⭐</span>
          <span class="btn-label">気になる</span>
        </button>
        <button class="action-btn btn-detail" onclick="openDetail()">
          <span class="btn-icon">📋</span>
          <span class="btn-label">詳細を見る</span>
        </button>
        <button class="action-btn btn-url" id="btnUrl" onclick="openUrl()">
          <span class="btn-icon">🔗</span>
          <span class="btn-label">公式サイトへ</span>
        </button>
      </div>
    </div>

    <!-- ===== Done ===== -->
    <div class="screen" id="screen-done">
      <div class="state-icon">🎉</div>
      <div class="state-title">すべて確認しました！</div>
      <p class="state-msg">お疲れさまでした。<br>気になった挑戦は右上から確認できます。</p>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="restartSwipe()">もう一度見る</button>
        <button class="btn btn-ghost" onclick="openFavModal()">気になるリスト ⭐</button>
      </div>
      <p class="done-fav-hint" id="doneFavHint"></p>
    </div>

  </div>
</main>

<!-- ===== Detail Modal ===== -->
<div class="modal-overlay" id="modal-detail" onclick="handleOverlayClick(event,'modal-detail')">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal('modal-detail')">✕</button>
      <div class="modal-org" id="detailOrg"></div>
      <div class="modal-title" id="detailTitle"></div>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- ===== Favorites Modal ===== -->
<div class="modal-overlay" id="modal-fav" onclick="handleOverlayClick(event,'modal-fav')">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal('modal-fav')">✕</button>
      <div class="modal-org">気になるリスト</div>
      <div class="modal-title">保存した挑戦機会</div>
    </div>
    <div class="modal-body">
      <div class="fav-list" id="favList"></div>
      <button class="fav-clear-btn" id="favClearBtn" onclick="clearAllFavs()" style="display:none">
        ✕ すべてクリア
      </button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONFIG
============================================================ */
const API_URL = 'https://gakuchika-source-db.vercel.app/api/sources';
const FAV_KEY = 'challengeSwipeFavorites';

/* ============================================================
   STATE
============================================================ */
let sources = [];
let currentIndex = 0;

/* ============================================================
   FIELD ACCESSORS
   ─ 複数フィールド名を試してフォールバックで取得
============================================================ */
function getStr(src) {
  // returns a curried field-getter for a source object
  return function(...keys) {
    for (const k of keys) {
      const v = src[k];
      if (v !== undefined && v !== null && String(v).trim() !== '') return String(v).trim();
    }
    return '';
  };
}

function getArr(src, ...keys) {
  for (const k of keys) {
    if (Array.isArray(src[k]) && src[k].length > 0) return src[k];
  }
  return [];
}

/* ============================================================
   SCREEN CONTROL
============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

/* ============================================================
   localStorage FAVORITES
   ─ Supabaseは使わない。localStorageのみ。
============================================================ */
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); }
  catch (e) { return []; }
}

function saveFavs(favs) {
  try { localStorage.setItem(FAV_KEY, JSON.stringify(favs)); }
  catch (e) { console.warn('localStorage write error', e); }
}

function getSrcId(src) {
  return getStr(src)('id', 'sourceId', '_id', 'uuid') || getStr(src)('title');
}

function isFaved(src) {
  const id = getSrcId(src);
  return loadFavs().some(f => getSrcId(f) === id);
}

/** トグル: true=追加, false=削除 */
function toggleFavById(src) {
  const favs = loadFavs();
  const id = getSrcId(src);
  const idx = favs.findIndex(f => getSrcId(f) === id);
  if (idx >= 0) {
    favs.splice(idx, 1);
    saveFavs(favs);
    return false;
  } else {
    favs.push(src);
    saveFavs(favs);
    return true;
  }
}

function updateFavCountBadge() {
  document.getElementById('favCount').textContent = loadFavs().length;
}

/* ============================================================
   RENDER CARD
============================================================ */
function renderCard(src, idx, total) {
  const f = getStr(src);
  const title   = f('title', 'name');
  const org     = f('organizationName', 'org', 'company', 'organization', 'orgName');
  const cat     = f('type', 'category', 'cat');
  const area    = f('area', 'region', 'location');
  const areas   = getArr(src, 'regions', 'areas', 'targetRegions');
  const displayArea = area || (areas.length ? areas.join(' / ') : '');
  const term    = f('term', 'duration', 'period');
  const reward  = f('reward', 'compensation', 'salary');
  const deadline = f('deadline', 'applicationDeadline', 'dueDate', 'closingDate');
  const gain    = f('gain', 'shortDescription', 'description', 'recommendationText', 'summary', 'overview');
  const tags    = getArr(src, 'tags', 'keywords', 'skills');
  const url     = f('url', 'websiteUrl', 'officialUrl', 'link', 'sourceUrl', 'applyUrl');

  /* progress */
  const pct = total > 1 ? Math.round((idx / (total - 1)) * 100) : 100;
  document.getElementById('progressBar').style.width = Math.max(2, pct) + '%';
  document.getElementById('progressLabel').textContent = `${idx + 1} / ${total}件`;

  /* fav button state */
  updateFavBtn(isFaved(src));

  /* url button */
  const urlBtn = document.getElementById('btnUrl');
  urlBtn.disabled = !url;

  /* badges */
  const badgesHtml = [
    cat        ? `<span class="badge badge-cat">${cat}</span>` : '',
    displayArea ? `<span class="badge badge-area">📍 ${displayArea}</span>` : '',
    term       ? `<span class="badge badge-term">${term}</span>` : '',
    reward     ? `<span class="badge badge-reward">💰 ${reward}</span>` : '',
  ].filter(Boolean).join('');

  const tagsHtml = tags.length
    ? `<div class="card-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
    : '';

  const deadlineHtml = deadline
    ? `<div class="card-deadline"><span class="dl-label">締切</span>${deadline}</div>`
    : '';

  document.getElementById('mainCard').innerHTML = `
    <div class="card-header">
      ${org ? `<div class="card-org">${esc(org)}</div>` : ''}
      <div class="card-title">${esc(title) || '（タイトル未設定）'}</div>
    </div>
    <div class="card-body">
      ${badgesHtml ? `<div class="card-badges">${badgesHtml}</div>` : ''}
      ${tagsHtml}
      ${gain ? `<div class="card-gain">${esc(gain)}</div>` : ''}
      ${deadlineHtml}
    </div>
  `;
}

function updateFavBtn(faved) {
  const btn = document.getElementById('btnFav');
  if (faved) {
    btn.classList.add('saved');
    btn.innerHTML = '<span class="btn-icon">✅</span><span class="btn-label">保存済み</span>';
  } else {
    btn.classList.remove('saved');
    btn.innerHTML = '<span class="btn-icon">⭐</span><span class="btn-label">気になる</span>';
  }
}

/* HTML エスケープ */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ============================================================
   NAVIGATION
============================================================ */
function skipCard() {
  advanceCard();
}

function toggleFavCard() {
  if (!sources.length) return;
  const src = sources[currentIndex];
  const added = toggleFavById(src);
  updateFavBtn(added);
  updateFavCountBadge();
}

function advanceCard() {
  currentIndex++;
  if (currentIndex >= sources.length) {
    showDone();
  } else {
    renderCard(sources[currentIndex], currentIndex, sources.length);
  }
}

function showDone() {
  const count = loadFavs().length;
  document.getElementById('doneFavHint').textContent =
    count > 0 ? `⭐ ${count}件の挑戦を「気になる」に保存しました` : '';
  showScreen('screen-done');
}

function restartSwipe() {
  currentIndex = 0;
  if (!sources.length) { loadSources(); return; }
  renderCard(sources[0], 0, sources.length);
  showScreen('screen-swipe');
}

function openUrl() {
  if (!sources.length) return;
  const url = getStr(sources[currentIndex])('url', 'websiteUrl', 'officialUrl', 'link', 'sourceUrl', 'applyUrl');
  if (url) window.open(url, '_blank', 'noopener noreferrer');
}

/* ============================================================
   DETAIL MODAL
============================================================ */
function openDetail() {
  if (!sources.length) return;
  const src = sources[currentIndex];
  const f = getStr(src);
  const title    = f('title', 'name');
  const org      = f('organizationName', 'org', 'company', 'organization');
  const cat      = f('type', 'category', 'cat');
  const area     = f('area', 'region', 'location');
  const areas    = getArr(src, 'regions', 'areas', 'targetRegions');
  const displayArea = area || (areas.length ? areas.join(' / ') : '');
  const term     = f('term', 'duration');
  const reward   = f('reward', 'compensation');
  const deadline = f('deadline', 'applicationDeadline', 'dueDate');
  const gain     = f('gain', 'shortDescription', 'description', 'recommendationText', 'summary', 'overview');
  const tags     = getArr(src, 'tags', 'keywords', 'skills');
  const url      = f('url', 'websiteUrl', 'officialUrl', 'link', 'sourceUrl', 'applyUrl');
  const gradeArr = getArr(src, 'grade', 'grades', 'targetGrade');
  const grade    = f('grade');

  document.getElementById('detailOrg').textContent   = org   || '主催者不明';
  document.getElementById('detailTitle').textContent = title || '（タイトル未設定）';

  const rows = [
    cat           ? { label: 'カテゴリ',     val: cat } : null,
    displayArea   ? { label: 'エリア',        val: displayArea } : null,
    term          ? { label: '期間',          val: term } : null,
    reward        ? { label: '報酬',          val: reward } : null,
    deadline      ? { label: '締切',          val: deadline } : null,
    gradeArr.length ? { label: '対象学年', val: gradeArr.join('・') + '年生' }
                   : (grade ? { label: '対象学年', val: grade } : null),
    tags.length   ? { label: 'タグ',         val: tags.join(' ・ ') } : null,
    gain          ? { label: '得られる経験',  val: gain } : null,
  ].filter(Boolean);

  document.getElementById('detailBody').innerHTML = `
    ${rows.map(r => `
      <div class="detail-row">
        <div class="detail-label">${r.label}</div>
        <div class="detail-val">${esc(r.val)}</div>
      </div>
    `).join('')}
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="toggleFavCard();updateDetailFavBtn()">
        ${isFaved(src) ? '✅ 保存済み' : '⭐ 気になる'}
      </button>
      ${url ? `<a class="btn btn-ghost" href="${esc(url)}" target="_blank" rel="noopener noreferrer">公式サイト →</a>` : ''}
    </div>
  `;

  openModal('modal-detail');
}

function updateDetailFavBtn() {
  if (!sources.length) return;
  const src = sources[currentIndex];
  const btn = document.querySelector('#modal-detail .modal-actions .btn-primary');
  if (btn) btn.textContent = isFaved(src) ? '✅ 保存済み' : '⭐ 気になる';
}

/* ============================================================
   FAVORITES MODAL
============================================================ */
function openFavModal() {
  const favs = loadFavs();
  const listEl = document.getElementById('favList');
  const clearBtn = document.getElementById('favClearBtn');

  if (favs.length === 0) {
    listEl.innerHTML = `
      <div class="fav-empty">
        まだ保存した挑戦機会がありません。<br>
        ⭐ 気になるボタンで保存できます。
      </div>`;
    clearBtn.style.display = 'none';
  } else {
    listEl.innerHTML = favs.map(f => {
      const title = getStr(f)('title', 'name');
      const org   = getStr(f)('organizationName', 'org', 'company', 'organization');
      const url   = getStr(f)('url', 'websiteUrl', 'officialUrl', 'link', 'sourceUrl', 'applyUrl');
      const cat   = getStr(f)('type', 'category', 'cat');
      return `
        <div class="fav-item">
          ${org ? `<div class="fav-item-org">${esc(org)}${cat ? ` ・ ${esc(cat)}` : ''}</div>` : ''}
          <div class="fav-item-title">${esc(title) || '（タイトル未設定）'}</div>
          ${url ? `<a class="fav-item-link" href="${esc(url)}" target="_blank" rel="noopener noreferrer">公式サイト →</a>` : ''}
        </div>`;
    }).join('');
    clearBtn.style.display = '';
  }

  openModal('modal-fav');
}

function clearAllFavs() {
  if (!confirm('気になるリストをすべてクリアしますか？')) return;
  saveFavs([]);
  updateFavCountBadge();
  updateFavBtn(false);
  openFavModal(); // refresh
}

/* ============================================================
   MODAL HELPERS
============================================================ */
function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function handleOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

/* キーボード ESC でモーダルを閉じる */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    ['modal-detail', 'modal-fav'].forEach(id => closeModal(id));
  }
});

/* ============================================================
   API LOAD
   ─ /api/sources GET のみ使用
   ─ 失敗時はダミーを出さない
   ─ 0件時は掲載準備中を表示
============================================================ */
async function loadSources() {
  showScreen('screen-loading');
  currentIndex = 0;
  sources = [];

  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    /* 配列形式・オブジェクト包み形式の両方に対応 */
    let list = [];
    if (Array.isArray(data)) {
      list = data;
    } else if (data && Array.isArray(data.sources)) {
      list = data.sources;
    } else if (data && Array.isArray(data.data)) {
      list = data.data;
    } else if (data && typeof data === 'object') {
      /* 最初に見つかった配列フィールドを試す */
      const found = Object.values(data).find(v => Array.isArray(v));
      if (found) list = found;
    }

    if (list.length === 0) {
      /* API成功・0件 → 掲載準備中 */
      showScreen('screen-empty');
      return;
    }

    sources = list;
    renderCard(sources[0], 0, sources.length);
    showScreen('screen-swipe');

  } catch (err) {
    /* API失敗 → エラー表示（ダミーデータは出さない） */
    console.error('[swipe-lp] API error:', err);
    showScreen('screen-error');
  }
}

/* ============================================================
   INIT
============================================================ */
updateFavCountBadge();
loadSources();
</script>
